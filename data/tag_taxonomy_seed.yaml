  - SOC-code                     # Standard Occupational Classification; underpins same-or-similar
  - Matter-of-Dhanasar           # USCIS precedent for EB-2 NIW eligibility
  - Section-245(k)               # INA §245(k); 180-day status-violation forgiveness for AOS
  - INA-§214(g)                  # statutory H-1B cap basis (65k + 20k US-master's)
  - I-140-revocation-immunity-180day  # AC21 §106(c)(2) "duly approved": an I-140 approved
                                      # for ≥180 days retains priority-date portability even
