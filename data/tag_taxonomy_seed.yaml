# Blindspot V2 tag taxonomy seed — vertical: cn-sde-jobhunt
# Open vocabulary: the Triage Officer may propose new tags at runtime;
# they're auto-normalized (via voyage-3 embedding similarity > 0.85 → merge)
# or auto-added (otherwise) with no human-review gate. This is the starting
# set for the CN-SDE-jobhunt vertical.

domain:
  # Hierarchical path syntax — children inherit from parents.
  # Root is cn-sde-jobhunt: Chinese international students in the US,
  # making SDE job-hunt and visa-coupled career decisions.
  - cn-sde-jobhunt
  - cn-sde-jobhunt/visa
  - cn-sde-jobhunt/offer-comp
  - cn-sde-jobhunt/employer-switch
  - cn-sde-jobhunt/return-to-china

