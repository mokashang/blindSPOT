  - CPT-not-yet-used
  - OPT-active
  - STEM-extension-window
  - GC-backlog
  - I-140-approved
  - laid-off

  # Family-located petitions (parent / spouse) — referenced by D7
  # parents-on-b2-childcare-aging-care-state-residency fixture
  - I-130                          # Family-based petition (Form I-130);
                                   # IR-5 parent-of-US-citizen path requires
                                   # sponsor naturalization first. INA §201(b)(2)(A)(i).
                                   # Cited in D7 parents-on-b2 fixture as the only
                                   # legal long-term parent-residency path.
  - B-2-extension                  # B-2 visitor stay extension via Form I-539,
                                   # max +6mo per grant. 8 CFR §214.1(c)(2).
                                   # Frequent filings raise immigrant-intent
                                   # presumption at next visa renewal (Murthy
                                   # bulletin practice advisory); central
                                   # mechanic in D7 parents-on-b2 fixture.

risk_surface:
  # Flat. What kind of harm/concern is in play.
  - visa-status-pressure         # losing legal status if event X happens
  - sponsorship-fit              # employer's willingness/track-record to sponsor
  - cap-gap-timing               # OPT-to-H1B gap window
  - lottery-failure              # consequences if H-1B lottery not selected
  - 60-day-grace-period          # post-termination clock for status
  - priority-date-retrogression  # GC backlog risk for India/China-born
  - return-to-china-irreversibility  # cost of failed-return; one-way door
  - sponsorship-asymmetry        # FAANG-vs-startup gap on visa
  - tax                          # US/CN double-tax, RSU-vesting tax timing
  - legal                        # contract clauses, day-1-CPT legitimacy, etc.
  - timing                       # when to file, when to leave, when to return
  - counterparty                 # employer behavior (layoffs, broken promises)
  - opportunity-cost             # choosing A means giving up B
  - regret                       # cost of irreversible decisions
  - info-asymmetry               # they know things you don't (esp. attorneys)
  - power-dynamics               # leverage in negotiation under visa pressure
  - family-coupling              # spouse / kids' status coupled to yours
  - rsu-cliff-timing             # vest-cliff dynamics vs. job-change timing
  - gc-timeline-vs-comp-cycle    # GC progress traded against comp / promo windows
  - priority-date-preservation   # keeping the earlier PD when changing employers
  - i-140-portability            # AC21 portability availability AND timing risk
  - cap-gap-eligibility          # OPT->H-1B cap-gap auto-extension eligibility test
                                 # (employer must file H-1B + lottery selected
                                 # + EAD date constraints); distinct from cap-gap-timing
  - retention-vs-departure       # post-cliff / post-promo-cycle decision axis:
                                 # RSU refresh + GC progression at current employer
                                 # vs. opportunity cost of leaving
  - rfe-risk-on-amended-i485     # USCIS-RFE risk on AC21 §106(c) I-485 portability
                                 # when new SOC code differs from PERM's SOC code;
                                 # same-or-similar denial -> new PERM at new employer
  - f1-opt-unemployment-cap      # F-1 OPT has a 90-day cumulative unemployment cap;
                                 # STEM-OPT extension raises the cumulative cap to 150 days.
                                 # Exceeding terminates F-1 status. Critical under post-layoff.
  - ead-renewal-authorization-gap  # EAD renewal must be filed within the 180-day window
                                   # before expiry. Only specific categories get the 180-day
                                   # auto-extension (H-4-EAD lost this protection in some
                                   # USCIS interpretations 2018-2022 then partial restoration);
                                   # gaps create work-authorization breaks
  - i-485-ac21-180day-rule       # AC21 §106(c) portability requires the I-485 to be pending
                                 # for ≥180 days before the applicant can change employers
                                 # to a same-or-similar occupation without re-filing PERM/I-140
  - b2-frequent-reentry-immigrant-intent-flag  # CBP secondary inspection scrutinizes
                                               # B-2 visitors with repeat long stays under
                                               # INA §214(b) presumption of immigrant intent;
                                               # frequent leave-and-reenter cycles raise
                                               # denial-of-entry risk. Central mechanic in
                                               # D7 parents-on-b2 fixture; AILA / Murthy
                                               # practice advisories on B-2 stay patterns.
  - emergency-medicaid-state-eligibility-asymmetry  # PRWORA §401 / 42 USC §1396b(v) preserves
                                                    # emergency-Medicaid for non-qualified aliens
                                                    # (incl. B-2 visitors) but eligibility rules
                                                    # vary materially by state (CA Medi-Cal vs
                                                    # NY / WA / MA), and income/affidavit-of-support
                                                    # treatment is ambiguous for visitors.
                                                    # Couples healthcare risk to state-of-residence
                                                    # choice. Cited in D7 parents-on-b2 fixture.

