id: stem-opt-vs-capgap-employer-choice
text: |
  Graduated MS Computer Science in May; started 12-month OPT in June.
  H-1B lottery March cycle came back as not-selected. I have two offers
  on the table now (month 4 of OPT): a Series B startup (no E-Verify,
  +20% comp) and a mid-size enterprise SaaS company (E-Verify, base
  comp). If I take the startup I cannot extend onto the 24-month
  STEM-OPT — STEM-OPT requires the employer to be enrolled in E-Verify
  AND to file an I-983 training plan. The startup has said they'd "look
  into E-Verify enrollment by the time my STEM extension is needed"
  but won't commit. If I take the E-Verify employer I'm safer on the
  STEM route but burn ~$30k/yr in comp. STEM-eligible CIP code on my
  degree is confirmed. What am I actually trading?
