id: j1-waiver-vs-h1b-conversion
text: |
  I finished a 3-year postdoc on J-1 last month. My J-1 carries a
  two-year home-country physical-presence requirement (212(e)). A US
  university has offered me a faculty position and is willing to file
  H-1B as a cap-exempt employer — they say the cap-exempt H-1B "should
  work" without me doing a waiver first. My home country is India. The
  three plausible paths I see: (a) Conrad-30-style waiver (but that's
  physician-focused and I'm a chemist), (b) "no objection" statement
  waiver from my home government — process is opaque and slow, or (c)
  the university files H-1B and we hope the 212(e) bar doesn't surface
  at the eventual green-card stage. How do I think about whether the
  cap-exempt H-1B actually clears the 212(e) problem?
