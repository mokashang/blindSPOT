id: layoff-during-h1b-grace
text: |
  Laid off on Tuesday. H-1B, year 3 of 6, no I-140 yet (PERM was filed
  4 months ago, still pre-audit). My 60-day grace period starts from
  the last day of employment in the termination letter — which is 2
  weeks of severance from now, so my real grace clock starts in 14
  days. My H-4 spouse has no EAD (we never qualified since no approved
  I-140). She's the primary caregiver for our toddler. Two questions:
  (a) does the severance period extend the grace clock or not, and
  (b) my spouse and child are on H-4 — when does THEIR status end if
  I can't find a new H-1B sponsor in 60 days?
expected_domains: [immigration]
