id: ap-trip-during-aos
text: |
  I-485 filed 4 months ago (EB-2, concurrent with I-140 under DFF
  eligibility). My H-1B is still valid for 18 more months; visa stamp in
  passport is current through next year. Advance Parole I-131 was filed
  the same day as the I-485 but is still pending. My mother was just
  hospitalized in Mumbai — likely 1–2 week trip needed within the next
  10 days. Options I see: (a) emergency AP appointment at a USCIS field
  office, (b) travel on the still-valid H-1B visa stamp on the theory
  that H-1B is dual-intent so my I-485 isn't abandoned, (c) wait for
  regular AP. The H-1B option feels fastest but my attorney's office is
  closed for the weekend. What am I missing?
