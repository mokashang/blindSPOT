id: eb2-vs-eb3-downgrade-tradeoff
text: |
  EB-2 India, priority date May 2014. I-140 approved 6 years ago. Current
  Visa Bulletin shows EB-3 India about 8 months ahead of EB-2 India on
  the Final Action Date. My attorney mentioned a "downgrade and interfile"
  option — file a second I-140 in EB-3 using the same approved PERM, then
  interfile my pending I-485 onto the EB-3 file. Filing fee + attorney
  time is ~$5k. EB-3 has been faster than EB-2 for India once before
  (2020–22) and then reversed. Worth doing now, or is this a one-month
  bulletin artifact I'd regret chasing?
