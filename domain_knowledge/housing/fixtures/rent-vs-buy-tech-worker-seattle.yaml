id: rent-vs-buy-tech-worker-seattle
text: |
  Renting a $4,200/mo 2BR in Capitol Hill, Seattle, for the last 3 years.
  Dual-income couple, $480k combined base + ~$320k RSU (mostly vested
  Amazon stock, also some unvested Microsoft from my partner). We have
  $310k liquid plus another $180k in brokerage. A 1,650sqft townhome in
  Ravenna is asking $895k; 20% down at 6.75% on a 30-year fixed pencils
  out to roughly $4,650/mo P&I + ~$725/mo property tax + ~$110/mo
  insurance + $0 HOA = ~$5,485/mo all-in before maintenance. Seattle
  price-to-rent on equivalent SFRs hovers around 22. Friends keep telling
  us we're "throwing money away on rent" but I keep running the NYT
  calculator and it spits out rent-favored. We expect to stay 5–7 years
  unless one of us takes a Bay Area offer (~30% probability over that
  window). Do we buy or stay renting?
