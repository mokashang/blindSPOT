id: cobra-vs-marketplace-layoff-q4-deductible-met
text: |
  Laid off November 3rd from a 2,400-person tech employer; severance
  is 12 weeks pay plus continued employer health-plan contribution
  through Dec 31, after which COBRA notice arrives. Family of 4 — me,
  spouse (not currently working), two kids (ages 8 and 11). On the
  PPO this year, family deductible was $4,000 and we hit $6,750 of
  the $8,000 family OOP-max in March when our older kid had an
  appendectomy. COBRA quote on the same plan is $2,340/mo family-
  tier. 2027 projected household income — me job-hunting on a 4-month
  runway, spouse staying out of workforce — is around $55k (severance
  + maybe a Q3 start). Healthcare.gov silver-benchmark for our county
  pencils at $0/mo after APTC at that income, with a silver-CSR-87
  variant. Marketplace 60-day SEP starts when employer coverage
  actually ends (Dec 31), not the layoff date. Older kid has a
  follow-up specialist visit booked for Jan 12 with the surgeon who
  did the appendectomy. Do we COBRA through year-end to lock in the
  almost-met OOP-max, then marketplace Jan 1? Or marketplace
  immediately and eat the $0-deductible reset? Or skip coverage for
  60 days and retroactively elect COBRA if something happens?
