id: medicare-part-b-delay-65-still-working-small-employer
text: |
  Turning 65 in March 2027. Still working full-time at a 14-employee
  architecture firm; founder + 13 staff. Our employer plan is a fully-
  insured small-group BCBS PPO, $0/mo employee-only premium, $1,500
  deductible, $4,000 OOP-max. HR (the founder's wife, who handles
  benefits) says "just stay on our plan, you don't need Medicare yet,
  we'll re-evaluate when you actually retire." Plan to keep working
  through 67 or 68 if my back holds out. I've also been maxing my HSA
  for the last 6 years ($43k balance, all invested in VTSAX) on the
  HDHP option my firm USED to offer before switching to PPO three
  years ago. Started taking Social Security early at 62 because I
  wanted the cash flow. My CPA mentioned in passing "you might want
  to look at Part-A and HSA" but didn't follow up. Spouse is 61, not
  Medicare-eligible yet, currently a dependent on my employer plan.
  IEP runs Dec 2026 – June 2027. Skip Part B per HR's advice, or am
  I about to walk into a multi-decade penalty trap?
