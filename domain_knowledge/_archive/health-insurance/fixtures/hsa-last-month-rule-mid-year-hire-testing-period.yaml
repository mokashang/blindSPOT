id: hsa-last-month-rule-mid-year-hire-testing-period
text: |
  Started a new job July 14, 2026. Prior employer (left June 27) had
  PPO with no HSA option — zero HSA contributions YTD. New employer
  offers HDHP-with-HSA (Anthem $1,800 individual deductible, HSA-
  eligible per the SBC). I'm single, no dependents, 38, healthy,
  no chronic conditions. HSA cap 2026 is $4,300 self-only. Two
  contribution paths the benefits portal walks me through at
  onboarding:
  - "Standard prorated" = ~5.5 months of HDHP eligibility × ($4,300
    / 12) = roughly $1,970 max for 2026.
  - "Full annual via last-month rule" = full $4,300 if HSA-eligible
    on Dec 1, 2026, BUT subject to 13-month testing period running
    Dec 1, 2026 through Dec 31, 2027 — must remain HSA-eligible the
    entire 2027 calendar year, or face income recapture on the
    excess plus a 10% penalty (Form 8889 line 21).
  Complicating factors: (1) I'm dating someone seriously and we've
  loosely discussed marriage in 2027 — she's on her employer's PPO
  (non-HDHP) family plan with two kids from prior marriage; (2) I
  expect ~$3,000 in employer-FSA balance she'd want to roll into a
  joint FSA election next OE (a general-purpose FSA voids HSA-
  eligibility for both spouses, not just the FSA-electing spouse —
  per IRC §223(c)(1)(B)); (3) my 401(k) match is already maxed and
  I'm looking for the next dollar of tax-advantaged retirement
  space. Take the $2,330 incremental contribution via last-month
  rule and accept the testing-period bet, or play it safe with
  prorated?
