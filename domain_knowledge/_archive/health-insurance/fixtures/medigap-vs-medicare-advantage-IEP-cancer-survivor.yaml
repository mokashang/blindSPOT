id: medigap-vs-medicare-advantage-IEP-cancer-survivor
text: |
  Dad turns 65 in August, retiring from a state-government job
  September 30 (pension + retiree health bridge until Medicare picks
  up). IEP runs May through November. Treated for stage-II colorectal
  cancer in 2022; clean scans since but ongoing every-6-month
  surveillance colonoscopies with his GI at MSK in NYC. He lives in
  Westchester County NY (which has year-round Medigap GI by state
  rule, important context). Local Humana MA-PD has $0 premium, $500
  Part-A admit copay, $50 specialist copay, includes dental and the
  SilverSneakers gym he uses, but the network is mostly Westchester
  Medical Center system — does NOT include MSK as in-network. Plan
  G Medigap from a strong carrier runs $245/mo + a Wellcare Part-D
  plan at $32/mo + standard Part-B premium ($185/mo 2027) = ~$462/mo.
  He's leaning Humana MA because "$0 premium plus dental, why pay
  $245?" The MSK GI's office says "we accept Medicare but not Humana
  MA in Westchester." Mom (60) is staying on her own employer plan
  for now. Dad is asking me to help him decide. I keep reading about
  "trial rights" and "Medigap underwriting" and "you can switch
  back later" — true, false, depends on what?
