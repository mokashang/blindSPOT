id: silver-csr-vs-gold-self-employed-chronic-rx
text: |
  Self-employed graphic designer, projected 2027 MAGI ~$38k for
  household of 2 (me + spouse, no kids; spouse is a part-time
  bookstore employee, no benefits). California, Covered California
  marketplace. Spouse takes adalimumab (Humira biosimilar Cyltezo)
  for rheumatoid arthritis — current pharmacy cost ~$2,400/month
  retail; with employer plan two years ago, copay was $40 after
  manufacturer copay-card. Two plans I'm weighing for OE Nov 1 – Jan
  15:
  - Silver-CSR-87 (Anthem EPO, $200/mo after APTC, $1,200 deductible
    with CSR loading, $3,500 individual / $7,000 family OOP-max with
    CSR loading, Cyltezo on Tier-4 specialty at 30% coinsurance after
    deductible).
  - Gold PPO (Blue Shield, $360/mo after APTC, $0 deductible, $25
    PCP / $50 specialist copay, $4,500 individual / $9,000 family
    OOP-max, Cyltezo on Tier-4 specialty at $250/month flat copay
    after deductible-free start).
  At our income we're at 188% FPL so we hit the deeper CSR-87 tier.
  Manufacturer copay-card for Cyltezo says "not valid where prohibited
  including for plans with government cost-sharing assistance such as
  CSR" — which I read as silver-CSR disqualifies the copay-card but
  gold doesn't. Friend in r/personalfinance says "always silver-CSR
  when you qualify" but that copay-card carve-out flips the math.
  And: 2027 ARPA-IRA enhanced subsidies — extended or expired?
