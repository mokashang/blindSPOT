id: sharing-ministry-vs-aca-high-income-family
text: |
  Independent consultant (LLC, sole-member) in Texas, projected 2027
  business income $215k, spouse part-time (~$28k W-2), three kids
  (4, 7, 11). Healthy family, no chronic conditions, no medications.
  Marketplace gold (Blue Cross Blue Shield TX PPO) is $2,180/mo
  family-tier with zero APTC — household income way above any
  subsidy threshold even after ARPA-IRA. Our pastor recommended
  Christian Healthcare Ministries — $670/mo for the "Gold" tier (no
  relation to ACA gold), covers shareable expenses after $500 per-
  incident "personal responsibility," lifetime sharing limit
  $125k per incident with separate "Brother's Keeper" add-on. Saves
  us $1,510/mo = $18,120/year. Member testimonials sound great. I
  read CHM's guidelines: pre-existing conditions excluded for first
  3 years; routine maternity shareable only after 9 months of
  membership with sworn-statement marriage attestation; non-share
  for events caused by behaviors contrary to faith (alcohol-related
  injury, tobacco-related disease, "extramarital" pregnancy, mental-
  health-treatment OOP not shared by default). Our 11-year-old plays
  travel hockey — kids fall. My wife's family has BRCA-2; she hasn't
  been tested but is considering it; if she tests positive and
  pursues prophylactic surgery, is that "pre-existing"? Save the $18k
  or stay on ACA?
