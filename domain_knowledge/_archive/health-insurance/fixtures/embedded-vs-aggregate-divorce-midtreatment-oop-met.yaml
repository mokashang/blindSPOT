id: embedded-vs-aggregate-divorce-midtreatment-oop-met
text: |
  Mid-divorce, papers filed June; expected final decree October.
  Currently on STBX-husband's employer family plan (his employer
  Aetna PPO, self-funded ERISA, $5,000 family deductible / $14,100
  family OOP-max with embedded $7,050 individual sub-limit). I was
  diagnosed with breast cancer in March, started chemo May, currently
  $9,800 toward the family OOP-max — $7,050 of that is my embedded
  individual OOP-max, which is fully met. My oncologist at Dana-
  Farber has scheduled the next three chemo cycles June 30, July 21,
  August 11, plus a planned bilateral mastectomy in late September.
  Once divorce decree finalizes I lose coverage as STBX's spouse —
  QLE-triggered, 60-day SEP for marketplace OR I can elect COBRA
  on his plan for up to 36 months (divorce is a "secondary qualifying
  event" extending COBRA from 18 to 36 months). My own employer
  (15-person nonprofit) offers HMO family plan I could enroll in via
  divorce-QLE — but if I switch plans mid-treatment my deductible
  and OOP-met reset to $0, plus prior-auth on the mastectomy resets,
  plus my Dana-Farber team may not be in the HMO network. COBRA on
  the existing plan is ~$2,100/mo for self-only continuation.
  Marketplace silver with APTC at my projected $62k 2027 income is
  ~$120/mo — but again deductible/OOP-met resets and Dana-Farber
  network is plan-dependent. Decree timing isn't fixed yet — can
  ask my attorney to push to November if it matters. Net what?
