id: hoa-special-assessment-disclosure-gap
text: |
  Under contract on a $625k condo in Aventura, FL (north Miami-Dade).
  Building is 18 floors, 1996 construction, 154 units. HOA fee in the
  MLS listing was $720/mo. After paying for the resale package (HOA
  estoppel + reserve study + last 12 months of board meeting minutes
  — $300), I learned: (a) HOA voted in Feb to raise dues to $980/mo
  starting January (will hit me in month 1 as owner), (b) the building
  failed its post-Surfside Florida SB 4-D milestone inspection on the
  pool deck and exterior balconies, requiring a structural repair
  estimated at $4.2M; the HOA reserve study shows only $1.1M reserved
  for this. Board is voting on the funding mechanism in 3 weeks — early
  estimates float a $25–35k per-unit special assessment, payable either
  lump sum at vote or financed by HOA over 5 years. Closing is in 18
  days. My buyer's agent says "every condo in FL is dealing with this,
  it's priced in." Should I close, negotiate a credit, or walk and forfeit
  $12k earnest money?
