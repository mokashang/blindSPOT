  - depreciation-recapture-on-converted-rental
  - 2-of-5-year-use-test-on-section-121
  - installment-sale-buyer-default-risk
  - CRT-irrevocability-and-trustee-fees
  - aging-in-place-physical-suitability-of-stair-condo
expected_decisions: [D7]
expected_framings: [F3, F11, F14]
expected_blindspot_categories:
