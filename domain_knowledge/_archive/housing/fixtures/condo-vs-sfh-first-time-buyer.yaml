id: condo-vs-sfh-first-time-buyer
text: |
  First-time buyer in Denver metro. Budget around $700k all-in. Two
  finalists: (a) a 1,400sqft 2BR/2BA condo in LoHi, walkable, $695k,
  HOA $850/mo (includes water, trash, exterior, master insurance, gym,
  small reserve fund); building is 28 years old, last HOA reserve study
  was 2022 and showed reserves at 65% of recommended. (b) a 1,650sqft
  3BR/2BA SFR in Wheat Ridge 35 minutes further out, $710k, no HOA,
  needs ~$15k cosmetic work in the first year. Both are conventional
  warrantable, no PMI issue. My buyer's agent (referred by the
  mortgage broker) is pushing the condo hard — "easier to maintain,
  better appreciation in walkable urban core, you'll thank me." I'm a
  remote worker with occasional NYC trips; my partner commutes 3 days
  a week to RTD-served Anschutz. Neither of us has owned before. Which
  property type, and what am I missing about HOA / inspection / agent-
  alignment that nobody has flagged?
