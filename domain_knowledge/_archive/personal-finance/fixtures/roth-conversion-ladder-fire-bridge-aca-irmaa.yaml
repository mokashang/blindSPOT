id: roth-conversion-ladder-fire-bridge-aca-irmaa
text: |
  58yo and spouse 56, retired Jan 2026 (planned end-of-year-2025
  layoff with 18 months severance through June 2027 — confirmed
  payable as continued-W-2 not lump-sum). Combined household net
  worth $4.6M: $2.9M in traditional 401(k)s (mine $2.1M, spouse
  $0.8M), $620k Roth IRA combined (mostly conversions over the
  last 5 years), $580k taxable brokerage, $110k HSA (mine,
  10 years of HDHP contributions, fully invested), $390k home
  equity (paid off house in suburban Phoenix, AZ — moved from
  CA 2 years ago specifically for the 9.3% state-tax-savings on
  the planned Roth-conversion-ladder). Plan: pure-FIRE
  early-retirement, draw from taxable through 2027 while
  severance runs, then execute Roth-conversion-ladder from
  2027-2031 to bridge to Medicare-at-65 in 2033 (me) / 2035
  (spouse). 2026 income: $156k severance (mine) + $0 spouse
  + ~$3k taxable interest. 2027 projected: $78k severance
  through June + $0 spouse + ~$5k interest = ~$83k. ACA
  marketplace coverage starting 2028 (severance ends mid-2027,
  COBRA through end of 2027). At 138% FPL the ACA subsidy is
  large; the subsidy phase-out / cliff if 400% FPL reinstates
  post-ARPA-sunset becomes load-bearing. Decision: how to size
  the Roth conversions across 2027-2031, accounting for: (a)
  filling the 12% bracket vs 22% bracket vs 24% bracket — the
  2026 reversion of TCJA brackets makes the 12% bracket become
  15% and the 22% become 25%, so the cliff math is different
  by year; (b) ACA-subsidy MAGI thresholds — pushing income
  above 400% FPL (if reinstated) destroys the APTC, the
  effective marginal rate on the conversion-induced-subsidy-
  loss is huge; (c) IRMAA-2-year-lookback — converting in 2028
  affects 2030 Medicare Part B+D premiums starting at age 65;
  the IRMAA tier cliffs at $103k / $129k / $161k / $193k /
  $500k+ single MAGI ($206k+ MFJ) step up sharply, $1k-4k per
  tier per spouse; (d) the 5-year-clock per conversion — each
  conversion's 5-year aging clock for penalty-free principal
  withdrawal — I'll be 63 / 64 / 65 / 66 / 67 in the
  conversion years, all past 59.5, so the 10% penalty doesn't
  apply but the 5-year-clock-for-earnings-withdrawal-tax-free
  still does, and many people conflate the two clocks; (e) the
  Social-Security claim age question — spouse delayed to 70
  for higher survivor benefit, I'm claiming at FRA (67), the
  conversion-period overlaps with my pre-claim years; (f)
  what about the $110k HSA — pay current medical OOP and
  shoebox receipts, or use HSA for current medical (we have
  ~$8k/yr medical including dental/vision) to manage MAGI? And
  the most uncomfortable wrinkle: TCJA-2017 eliminated
  recharacterization — these conversions are irrevocable from
  the moment executed; no way to undo if 2028's stock-market
  declines wipe out the appreciation we were planning to lock
  into Roth.
