id: w2-vs-1099-first-engineer-ca-ab5
text: |
  Two-cofounder seed-stage B2B SaaS, just closed $1.5M
  pre-seed on a YC-form SAFE 4 months ago, currently
  $28k MRR. We need a backend engineer to scale our
  reliability + multi-tenancy work — projected 30-35 hrs/wk
  ongoing, will use our codebase, will attend our daily
  standup, will be paid weekly based on hours. We're in
  Delaware-incorporated but both founders live in CA
  (Berkeley + Oakland). Candidate is a freelance contractor
  based in Los Angeles, has 4 other clients on his roster
  (so he claims), wants to bill us $135/hr through his
  single-member LLC, prefers 1099. Our motivation for 1099:
  payroll complexity (we'd avoid Gusto + workers-comp +
  CA-SDI + CA-PFL + CA unemployment + small-group health
  decision), and the $135/hr is below our W-2 budget for an
  equivalent role. Three concerns. (1) ABC test under CA
  AB-5: prong (B) "outside usual course of business" — we're
  a SaaS company, he's writing backend services for our
  SaaS. He fails (B) on its face, regardless of (A) free-
  from-control and (C) customarily-engaged-in-independent-
  trade. Does his single-member LLC change the analysis?
  Some founder Twitter says "LLC immunizes you, just pay
  the LLC not the person" — that doesn't match what I read
  on the CA DIR site. (2) PAGA exposure: if we engage him
  as 1099 and the CA Labor Commissioner / a future-disgruntled
  contractor / a competitor's tip-off triggers an audit, the
  exposure is $100/pay-period/employee for initial PAGA
  violation, plus unpaid overtime, plus §203 waiting-time
  penalties (up to 30 days additional wages), plus attorney
  fees. At $135/hr × 35hrs × 52 weeks = $245k/yr, even one
  year of misclassification could cost us $50k+ in penalties
  alone. (3) The W-2 alternative loading: $135/hr × 2080hrs
  = $281k base-equivalent. With CA employer-side FICA 7.65%,
  FUTA + SUTA ~$2k, workers comp ~1% ($2.8k), CA-SDI 0.9% +
  PFL 0.4%, $1,200/mo small-group health employer-share
  ($14.4k) = ~$320k loaded vs $281k 1099. Is the 14% loading
  premium really worth the misclassification risk?
