id: sole-prop-vs-llc-side-hustle-nights
text: |
  Currently W-2 software engineer at a mid-cap public company
  in Austin TX, $185k base + ~$30k bonus, planning to stay at
  the day job indefinitely. Have a side project that's been
  earning consulting and small-product income: 4 small SaaS
  customers at $80-200/mo each, plus occasional freelance
  developer-hire projects (4 projects in the last 12 months at
  $5k-$15k each). Total side-project revenue projection 2026:
  ~$22k. Currently no entity — running everything through my
  personal name, depositing checks to personal checking, all
  income reported on Schedule C of my joint return. Three
  questions on the entity-formation timing. (1) Do I need an
  LLC at $22k revenue? TX is friendly — no state income tax,
  no franchise tax until $1.23M revenue (2024 threshold), but
  the annual public-information report is required. Most
  small-business forums say "$50k revenue is the LLC trigger"
  but that's a heuristic without a mechanism. The slip-and-
  fall / product-liability risks don't apply to remote
  software work. (2) The freelance projects each have a
  $1M+ E&O / professional-liability clause I sign. If a
  client sues me for breach, the LLC shield matters — but
  most of my contracts are personally indemnified anyway, so
  is the shield real? My day-job PIIA does NOT prohibit
  outside work but does claim IP on "work product related to
  the employer's business" — am I creating exposure by doing
  software for non-competing clients? (3) DBA vs LLC vs no
  entity: I could file a DBA at the Travis County clerk for
  $25 and open a business bank account under "Foo Software"
  without forming an LLC. That gives me brand identity + clean
  bookkeeping without the LLC formation cost ($300) and
  ongoing annual filing burden. Or is the right answer to wait
  until either revenue hits $80-100k OR a customer signs a
  contract with material indemnity exposure?
