id: solo-401k-vs-sep-ira-backdoor-roth
text: |
  Solo product-design consultant, 38, married filing jointly,
  spouse is W-2 at $115k. Texas resident. Operating as single-
  member CA LLC (we just moved to TX from SF six months ago,
  still untangling state-residency). Net SE income trajectory:
  $245k in 2024, projecting $310k in 2025. I've been doing
  back-door Roth via personal traditional-IRA → Roth conversion
  every January for 5 years. Today: $0 traditional IRA
  (cleared via prior-year backdoor), $72k Roth IRA, $40k Roth
  401(k) (rolled from prior W-2 employer when I went solo 6
  years ago — held in a Vanguard self-directed Roth IRA).
  Spouse: $48k 403(b) at her nonprofit employer, $35k Roth IRA,
  no traditional IRA. My existing CPA — solo-prep, generic
  Schedule C — is suggesting I open a SEP-IRA for 2025
  contributions because "it's the simplest." Specifically she
  proposes 20% × $310k × 0.9235 = ~$57k SEP-IRA contribution.
  Three things I'm trying to verify before letting her file.
  (1) The SEP-IRA balance counts as pre-tax IRA for backdoor-
  Roth pro-rata purposes (Form 8606 aggregation rule). If I
  contribute $57k SEP-IRA in 2025, my $7k backdoor-Roth for
  2025 becomes $7k × $7k/($7k + $57k) = $766 nontaxable, $6,234
  taxable at marginal 24%. That destroys the backdoor-Roth
  strategy. (2) Solo-401(k) alternative: $23,500 employee
  deferral + ~$48k profit-sharing on net SE = ~$71.5k, doesn't
  touch the IRA aggregation, preserves backdoor-Roth. But
  Vanguard / Fidelity / Schwab solo-401(k) plans don't
  support after-tax contributions / in-plan-Roth conversion
  (Mega-Backdoor Roth) — requires a custom plan-document
  ($500-$1,500 setup, ~$100/yr). At $310k net SE I'd hit the
  §415(c) $70k cap on regular contributions alone so the
  Mega-Backdoor wouldn't add capacity anyway, right? (3)
  Should I elect S-corp tax treatment for 2026 (decision 4
  parallel) — and if so, how does the W-2 split affect this
  retirement math?
