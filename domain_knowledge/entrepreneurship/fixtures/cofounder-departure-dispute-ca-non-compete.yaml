id: cofounder-departure-dispute-ca-non-compete
text: |
  Three-cofounder Delaware C-corp, Series A 18 months ago at
  $32M post-money ($8M raised, lead Index Ventures, one board
  observer + one board seat). Cap-table: founder A (me, CEO)
  20% pre-Series-A vested; founder B (CTO) 20% pre-Series-A
  vested; founder C (COO, the situation) 20% pre-Series-A,
  currently month 26 of 4-year vesting (54%). Series A added
  preferred 20% (lead 14%, secondary investors 6%), employee
  option pool 14%, common stock pool 12% reserved for advisors
  and convertible-note conversion residuals. All three founders
  are CA residents (SF / Oakland / Mountain View). Founder C
  has been performance-managing poorly for ~9 months — board
  has lost confidence — and we're approaching a forced
  separation. Documented issues: missed three quarterly OKRs,
  three direct reports left citing C's management style.
  Founder C disputes the facts. The agreement defines "for
  cause" as fraud / felony / material breach but says nothing
  about performance. Specific decisions converging. (1) The
  vesting calc: per agreement, "without-cause termination
  preserves vested per schedule; for-cause forfeits vested
  AND unvested" — so the for-cause / without-cause distinction
  is worth (54% - 0%) × $32M × 20% = ~$3.5M of equity value to
  founder C alone. They have hired employment counsel. (2)
  Non-compete: agreement has a 12-month broad non-compete and
  18-month non-solicit of customers and employees. CA
  Bus & Prof Code §16600 voids non-competes against employees
  (limited carve-outs: sale-of-business and partnership-
  dissolution). The FTC 2024 non-compete rule is in
  litigation and status varies. Non-solicit is more
  enforceable than non-compete even in CA. (3) Customer-
  poaching: we have evidence C has been talking to 3 of our
  named customers about a directly-competing concept. They
  haven't formally pitched yet but the conversations are
  documented in customer-side emails our customers forwarded
  to us. (4) Board / shareholder transition: C holds a board
  seat per founder-agreement; if we force them out, does the
  seat go vacant, board-elected, or remaining-founder-elected?
  Per certificate of incorporation it's "remaining-founders
  elect." Our Series A lead's protective provisions require
  investor consent for board composition changes.
