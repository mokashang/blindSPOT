id: bootstrap-vs-seed-saas-40k-mrr
text: |
  Two-cofounder B2B SaaS, sales-ops tooling for mid-market account
  executives, 14 months in. Currently at $42k MRR ($504k ARR run-
  rate), 17 paying customers, NRR ~108% over last 6 months, gross
  margin 78% (one full-time customer-success contractor at $4k/mo
  is the main COGS line). We're both pre-seed-eligible: my
  cofounder is ex-Salesforce PM, I'm ex-Looker eng manager. We
  have $145k combined personal runway burned to date and roughly
  18 months of remaining household runway each (both married, no
  kids yet, partners on supportive day-jobs). Two offers on the
  table from real pre-seed funds we like: (a) $1.5M on a $7.5M
  post-money SAFE cap, no discount, MFN clause, no pro-rata; (b)
  $2.0M priced seed at $10M post-money with full Series Seed
  paper (1x non-participating liquidation preference, pro-rata
  rights, one board seat, weighted-average broad-based anti-
  dilution, protective provisions on $250k debt / new equity /
  sale-of-company). At our current 11%/month MoM growth we'd hit
  $80k MRR in ~6 months on cash flow alone if we don't blow up
  the unit economics. The Indie Hackers framing says stay
  bootstrap and own 100%; the YC playbook says raise so we can
  hire and not lose the category to a venture-backed competitor.
  We honestly don't know which framing fits — and we don't know
  what the "raise from strength" inflection means at our specific
  numbers.
