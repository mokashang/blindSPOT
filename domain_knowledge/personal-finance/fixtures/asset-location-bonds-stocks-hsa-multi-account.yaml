id: asset-location-bonds-stocks-hsa-multi-account
text: |
  46yo dual-income couple, $290k W-2 + $215k W-2 in MA (5% flat
  state tax, MFJ federal 24% marginal). Three kids, two in
  college (junior, sophomore), one in high school. We've been
  contributing diligently for 20 years and our buckets now look
  like: $480k traditional 401(k) (mine) + $215k traditional 401(k)
  (spouse's), $95k Roth-401(k) (mine, started 5 years ago), $48k
  Roth-IRA (mine, backdoor-converted since 2018) + $42k Roth IRA
  (spouse's, also backdoor), $62k HSA (mine, family-coverage HDHP
  on my plan — invested 80% in cash earning 4% money-market and
  20% in S&P 500 because spouse keeps treating it as the medical
  emergency fund), $310k taxable joint brokerage (mostly VTI +
  $60k of VXUS held for 4 years currently up ~$15k, $30k of BND
  bond index, $15k of VNQ REIT). Target allocation we agreed on:
  70% stocks (50% US / 20% international) / 25% bonds / 5%
  alternatives-REITs. Reading Michael Kitces's asset-location
  series and the Bogleheads wiki, the canonical guidance is
  bonds in tax-deferred, stocks in taxable for LTCG-and-step-up,
  Roth holds the highest-expected-return assets, HSA as
  stealth-IRA-in-stocks-not-cash. But our actual placement is
  ad-hoc — bonds and REITs are scattered across taxable AND
  pre-tax 401(k); the $62k HSA in 80% cash is bothering me; the
  $60k VXUS in taxable might be there for the foreign-tax-credit
  reason or might be there by accident — I don't remember.
  Questions: (1) move the bonds out of taxable into the 401(k)
  and replace with stocks? Realized $5k LTCG on the bond sale
  is offset against the $30k unrealized loss on the international
  fund from 2022 (still down 5%), or do we tax-loss harvest
  those losses separately? (2) the $62k HSA — move from cash to
  100% stocks (Fidelity FZROX equivalent) and shoebox medical
  receipts going forward, or keep some buffer? My spouse will
  not budge below $20k cash unless I show that we'd never need
  to access HSA for current medical for the next 10 years —
  feasible given dental, vision, kids' braces ahead? (3) the
  $60k VXUS in taxable — is the foreign-tax-credit recovery on
  Form 1116 actually worth the higher tax-drag from non-qualified-
  dividend treatment, or is this an old myth and bonds-in-tax-
  deferred wins anyway? Spouse and I disagree on all three.
