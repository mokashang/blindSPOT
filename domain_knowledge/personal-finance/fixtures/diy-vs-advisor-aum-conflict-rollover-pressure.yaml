id: diy-vs-advisor-aum-conflict-rollover-pressure
text: |
  52yo and spouse 54, both senior engineers in MN (5.85% top
  state-tax marginal, MFJ 24% federal). Combined household
  $2.1M: $1.4M traditional 401(k) (mine, currently at MegaCorp
  where I've been 18 years), $380k Roth IRA (mine, backdoor
  converted since 2015), $120k Roth IRA (spouse), $180k taxable
  brokerage, $35k HSA. Spouse has $0 retirement at her current
  small employer (no 401(k)) — historical 403(b) from a former
  nonprofit job has $90k in it, untouched. I'm taking an
  early-retirement-package offer this year (June 2026 exit, age
  53 — so pre-59.5; Rule of 55 applies to my MegaCorp 401(k)
  for penalty-free withdrawal from age 55 onward, if I leave AT
  OR AFTER age 55 — but I'm 52 leaving at 53, so the Rule of 55
  doesn't apply unless I work until 55+ at MegaCorp, which the
  package doesn't allow). Question: in the last month I've had
  three separate "free retirement consultations" — (a)
  MegaCorp's preferred provider Empower Retirement (formerly
  Personal Capital, now AUM-fee at 0.89% / yr on first $1M);
  (b) a "fee-only fiduciary" from a local firm a colleague
  recommended — turns out on closer inspection their structure
  is "fee-based" not fee-only (AUM 1.0%/yr PLUS commissions on
  insurance/annuity products); (c) Fidelity (where I already
  have my Roth IRA) offering a "complimentary retirement plan
  review" with their wealth-management-arm. All three are
  pushing me to: (1) ROLL OVER the $1.4M traditional 401(k) and
  the $90k 403(b) into IRAs at their custody — citing
  "lower-cost investment options" and "more flexibility." (2)
  CONVERT a substantial portion of the rolled-over traditional
  IRA to Roth via aggressive 5-year-Roth-conversion-ladder over
  the early-retirement years 2026-2030 (I'll have low W-2
  income — the package severance through end of 2026 then $0
  through 2030 unless I do contracting). (3) PURCHASE an
  annuity (the fee-based one specifically: "guaranteed lifetime
  income, $200k single-premium-immediate-annuity for $1k/mo for
  life"). Concerns: (a) rolling 401(k) to IRA weakens federal-
  bankruptcy creditor-protection from unlimited (ERISA) to
  $1.5M-indexed (IRA); I'm not currently in litigation but
  professional-liability exposure is non-zero. MN state shield
  for IRA is modest — checked at $80k-indexed-after-deduction.
  (b) the AUM-fee structure: 0.89-1.0% on $2.1M is $19-21k/yr,
  $625-700k cumulative drag over 30-year retirement at 4%
  compounding — that's a third of my $2.1M starting point.
  (c) the annuity pitch — single-premium-immediate-annuities
  have ~7-10% commission baked into the structure (regulators
  call them "income annuities" but the agent's compensation is
  load-bearing); the "guaranteed income" frames real but the
  break-even-age vs simple invest-in-bonds is typically 84-86,
  beyond which the annuity wins; below which the asker is
  worse off vs Treasury-ladder. (d) DIY alternative: keep the
  $1.4M in the MegaCorp 401(k) plan (allowed by SPD up to age
  72; verify) where it stays ERISA-protected; the plan offers
  Vanguard institutional-class index funds at 0.04% ER (vs
  retail 0.10%); my Roth IRA already at Fidelity, taxable also
  Fidelity — I can self-manage the Roth-conversion-ladder using
  Open-Social-Security software (Mike Piper) for the SS-claim
  side and Boglehead-wiki + r/financialindependence flowchart
  for the conversion-ladder side; total cost ~$0/yr for DIY,
  vs $19-21k/yr AUM. (e) FINRA-BrokerCheck on the three
  advisors — Empower has 3 disclosure events (one customer
  complaint settled, two regulatory inquiries); the "fee-based"
  has 1 disclosure (registered-rep customer-complaint pending);
  Fidelity Wealth Management has none personally listed for the
  named advisor. SEC IAPD Form ADV Part 2A for Empower
  discloses the 0.89% as "advisory fee" but does NOT disclose
  the rollover-from-401(k)-recommendation as the AUM-trigger
  in plain language — buried in §10 conflicts-of-interest
  appendix. What's the right play? Is DIY-via-Bogleheads + hourly-
  fee Garrett-Planning-Network consult ($300/hr × ~10 hrs/yr =
  $3k/yr) the right move? Or am I being too suspicious of all
  three professional pitches?
