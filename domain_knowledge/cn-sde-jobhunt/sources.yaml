#         boundless-immigration-blog,
#         reddit-h1b-and-immigration-cases,
#         legacy-immigration-blindspots-corpus,
#         legacy-immigration-framings-corpus
#       (count: 5)
#   D11 Post-cliff (post-RSU-vest) career strategy under visa coupling
#       → 1p3a-offers-and-sponsorship,
#         reddit-cscareerquestions-international,
#         legacy-tech-career-blindspots-corpus,
