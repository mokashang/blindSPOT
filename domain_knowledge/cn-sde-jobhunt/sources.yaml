#         reddit-csmajors-newgrad,
#         reddit-h1b-and-immigration-cases,
#         legacy-immigration-blindspots-corpus
#       (count: 6)
#   D3  H-1B lottery backup paths (O-1, L-1, day-1-CPT, MS-pipeline)
#       → 1p3a-h1b-lottery-and-cap-gap,
#         reddit-cscareerquestions-international,
#         reddit-h1b-and-immigration-cases,
