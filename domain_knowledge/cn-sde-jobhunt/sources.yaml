#
# Observed coverage shape:
#   - No decision has zero coverage; the registry currently has ≥ 2 source-views
#     for every D1-D12 (no "(none — gap)" cells).
#   - Per-decision view counts range 2..6; mean ≈ 4.
#   - Remaining community-diversity gaps cluster in the legal-mechanic
#     decisions (D4 / D8 / D10) and the family-located decision (D7). These
#     are candidates for future source-view additions that pull from a non-
#     us-immigration-counsel community (e.g., 1p3a layoff threads for D7;
#     attorney-blog cross-checks vs r/h1b case narratives for D4 / D8 / D10).
#
# D6 / D11 single-community gaps reduced via this PR — see commits for the
# source-view tag-pivots that warrant the additional decision coverage. D6
# now also covered by reddit-h1b-and-immigration-cases (priority-date-backlog
