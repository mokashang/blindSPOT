# cn-sde-jobhunt — Source-views (Layer 4)
#
# Per-domain source registry. The runtime concatenates this list with
# data/source_registry.yaml at boot; this file is the in-scope domain's
# authoritative source list. Schema mirrors data/_archive/source_registry-v1.yaml:
#   id              kebab-case slug, globally unique
#   adapter         rss | reddit_search | hn_search | static_corpus
#   fetch_config    adapter-specific
#   community_tag   matches a file under cn-sde-jobhunt/communities/
#   tags            decisions / framings / personas this view covers
#   reliability     1-5; 4 means meets quality bar but not CN-specific
#   keyword_filter  on-topic gating terms
#   freshness_required  true → 7-day TTL; false → 30-day
#   notes           one-line moat statement
#
# Diversity constraint: ≥ 4 distinct community_tags. ≥ 8 entries total.

# ─── COVERAGE HEADER (derived, schema-only; loader ignores) ──────────────────
# Decision → source-views cross-reference table. Pure derivation from each
# source-view's `tags:` field below — no new claims. Same pattern as the
# blindspots.md (PR #97), decisions.md (PR #104), and framings.md (PR #106)
# front-matter cross-ref tables that closed the 4-way triangle across the
# three voice-work files. This block extends the same coverage-visibility
# pattern down to the Layer-4 source-view registry, surfacing which decisions
# are under-sourced and may need new source-view additions in future rounds.
#
