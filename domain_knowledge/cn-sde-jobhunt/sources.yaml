# cn-sde-jobhunt — Source-views (Layer 4)
#
# Per-domain source registry. The runtime concatenates this list with
# data/source_registry.yaml at boot; this file is the in-scope domain's
# authoritative source list. Schema mirrors data/_archive/source_registry-v1.yaml:
#   id              kebab-case slug, globally unique
#   adapter         rss | reddit_search | hn_search | static_corpus
#   fetch_config    adapter-specific
#   community_tag   matches a file under cn-sde-jobhunt/communities/
#   tags            decisions / framings / personas this view covers
#   reliability     1-5; 4 means meets quality bar but not CN-specific
#   keyword_filter  on-topic gating terms
#   freshness_required  true → 7-day TTL; false → 30-day
#   notes           one-line moat statement
#
# Diversity constraint: ≥ 4 distinct community_tags. ≥ 8 entries total.

# ─── community: oneponethreeacres (一亩三分地) ────────────────────────────────

- id: 1p3a-offers-and-sponsorship
  adapter: static_corpus
  fetch_config:
    path: data/static/1p3a-offers-curated.md
    keyword_filter: [sponsor, sponsorship, H1B, OPT, STEM, offer, comparison, 留学, 找工, 跳槽]
  community_tag: oneponethreeacres
  tags:
    - D1
    - D2
    - D9
    - D12
    - F1
    - persona/f1-final-year
    - persona/new-grad-sde
    - persona/post-opt-h1b-lottery
  reliability: 5
  freshness_required: false
  notes: |
    Hand-curated extraction of 一亩三分地 "Offers" / "Job-hunting" board
    threads where the sponsorship-willingness question is the load-bearing
    variable. 1p3a is hostile to scrapers — content is included only by
    manual curation per ROADMAP §9. Best for: how CN-student askers
    themselves frame the F-1 → H-1B pipeline; sponsor-willing employer
    lists (the 大厂 lists, the visa-friendly mid-tier lists); the
    "怎么挑offer" rubric the community actually uses.

- id: 1p3a-h1b-lottery-and-cap-gap
  adapter: static_corpus
  fetch_config:
    path: data/static/1p3a-lottery-curated.md
    keyword_filter: [lottery, cap-gap, 抽签, day-1-CPT, MS, masters, OPT]
  community_tag: oneponethreeacres
  tags:
    - D2
    - D3
    - F1
    - persona/post-opt-h1b-lottery
    - persona/mid-PERM-employer-switch
  reliability: 5
  freshness_required: false
  notes: |
    Curated H-1B-lottery and cap-gap threads. The 1p3a lottery-strategy
    discussion (multi-employer registration, day-1-CPT MS pipeline,
    F-1 re-enrollment fallback) is materially more detailed than
    English-language attorney blogs because the community runs the
    lottery every March and aggregates anecdata at scale.

- id: 1p3a-layoff-on-h1b-threads
  adapter: static_corpus
  fetch_config:
    path: data/static/1p3a-layoff-curated.md
    keyword_filter: [layoff, 裁员, severance, 60 day, grace, transfer, 离职]
  community_tag: oneponethreeacres
  tags:
    - D5
    - D7
    - F1
    - F5
    - persona/recently-terminated-on-h1b
    - persona/h4-spouse-with-ead
  reliability: 5
  freshness_required: true
  notes: |
    Layoff-while-on-H-1B threads, severance-and-grace-clock-interaction,
    family-located decision sequencing (H-4 spouse without EAD, kids'
    schooling, parent-visa visits during the recovery window). The
    2022-2024 tech-layoff wave produced a deep corpus on 1p3a; this
    is the moat against the English-only attorney narrative.

# ─── community: reddit-us-tech-collective ─────────────────────────────────

- id: reddit-cscareerquestions-international
  adapter: reddit_search
  fetch_config:
    subreddit: cscareerquestions
    query_template: "international student {entities} {risk_surfaces}"
    sort: top
    time_window: year
    min_upvotes: 50
  community_tag: reddit-us-tech-collective
  tags:
    - D1
    - D2
    - D3
    - D12
    - F2
    - F3
    - persona/f1-final-year
    - persona/new-grad-sde
  reliability: 3
  freshness_required: true
  notes: |
    English-language baseline. Catches the non-CN-international-student
    perspective that 1p3a doesn't see — Indian-applicant comparisons
    (useful as a contrast), domestic perspective on the sponsorship
    discount, US-domestic-engineer view of "why does it matter so
    much to them." Cross-checks 1p3a's risk weights against the
    broader pool.

- id: reddit-leetcode-interview-prep
  adapter: reddit_search
  fetch_config:
    subreddit: leetcode
    query_template: "{entities} interview offer"
    sort: top
    time_window: year
    min_upvotes: 30
  community_tag: reddit-us-tech-collective
  tags:
    - D1
    - D12
    - F3
    - persona/new-grad-sde
  reliability: 3
  freshness_required: true
  notes: |
    Interview-prep market intel — what offer levels the cohort is
    landing right now, comp deltas between FAANG and second-tier,
    international-friendly employer mentions in passing.

- id: reddit-csmajors-newgrad
  adapter: reddit_search
  fetch_config:
    subreddit: csMajors
    query_template: "{entities} international visa OPT"
    sort: top
    time_window: year
    min_upvotes: 30
  community_tag: reddit-us-tech-collective
  tags:
    - D1
    - D2
    - D12
    - F1
    - F3
    - persona/f1-final-year
    - persona/new-grad-sde
  reliability: 3
  freshness_required: true
  notes: |
    New-grad subreddit, heavier on the F-1-final-year persona than
    cscareerquestions. Surfaces sponsorship-list churn and recent-
    cohort offer outcomes.

# ─── community: us-immigration-counsel ────────────────────────────────────

- id: murthy-newsletter-h1b-perm
  adapter: rss
  fetch_config:
    feed: https://www.murthy.com/feed/
    keyword_filter: [H-1B, PERM, AC21, I-140, EB-2, EB-3, priority date, Visa Bulletin]
  community_tag: us-immigration-counsel
  tags:
    - D4
    - D5
    - D8
    - D10
    - F6
    - persona/mid-PERM-employer-switch
    - persona/recently-terminated-on-h1b
  reliability: 5
  freshness_required: true
  notes: |
    Murthy Law Firm bulletin. Authoritative on AC21 §106(c) "same or
    similar" portability mechanics, H-1B extension under §104(c),
    Visa Bulletin DFF/FAD reading. The CN-applicant moat is in the
    community profiles' framing of these mechanics; Murthy is the
    statutory-grounding source.

- id: boundless-immigration-blog
  adapter: rss
  fetch_config:
    feed: https://www.boundless.com/blog/feed/
    keyword_filter: [H-1B, H-4, EAD, marriage, AOS, I-485, green card, lottery]
  community_tag: us-immigration-counsel
  tags:
    - D5
    - D7
    - D10
    - F5
    - F6
    - persona/h4-spouse-with-ead
  reliability: 4
  freshness_required: true
  notes: |
    Boundless Immigration. Consumer-explainer voice on marriage-based
    filings, H-4 / H-4-EAD, and the AOS pipeline. Read in concert with
    Murthy for the contrast: Boundless is checklist-and-process;
    Murthy is statute-and-policy-manual.

- id: reddit-h1b-and-immigration-cases
  adapter: reddit_search
  fetch_config:
    subreddit: h1b
    query_template: "{entities} {risk_surfaces}"
    sort: top
    time_window: year
    min_upvotes: 20
  community_tag: us-immigration-counsel
  tags:
    - D2
    - D3
    - D5
    - D10
    - F1
    - F6
    - persona/post-opt-h1b-lottery
    - persona/recently-terminated-on-h1b
  reliability: 3
  freshness_required: true
  notes: |
    r/h1b case-narration threads. Lower-reliability counterweight to
    the attorney-blog house style: catches denials, RFEs, and
    edge-case adjudication anecdata. Useful for blindspot mining;
    not citable for legal-mechanic claims.

