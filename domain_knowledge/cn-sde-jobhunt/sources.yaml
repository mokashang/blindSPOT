#         legacy-immigration-framings-corpus
#       (count: 5)
#   D4  Employer switch mid-PERM / mid-I-140 (AC21 §106(c) portability)
#       → murthy-newsletter-h1b-perm,
#         legacy-immigration-blindspots-corpus,
#         legacy-immigration-framings-corpus
