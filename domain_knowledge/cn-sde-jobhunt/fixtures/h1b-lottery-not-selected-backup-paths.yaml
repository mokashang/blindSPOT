id: h1b-lottery-not-selected-backup-paths
domain: cn-sde-jobhunt
text: |
  Just got the email — H-1B not selected in the FY2027 lottery. Second
  attempt; same FAANG employer, they filed for me both years. I'm on
  STEM-OPT, second of two years, EAD expires Aug 14, 2026. Sixty-day
  grace clock isn't running yet (still in valid status), but the
  options window is closing fast. Three paths people on 1p3a and
  Reddit have been pushing me toward:
  (1) Day-1-CPT enrollment at a school like CIAM / Sofia / Westcliff —
      friends have done it, but I keep seeing Murthy / Reddy & Neumann
      bulletins flagging it as "high RFE risk" and the 2024 USCIS
      memo seems to have tightened scrutiny.
  (2) O-1 — my employer says they'd consider sponsoring, I have 2
      first-author papers from undergrad and a patent from work, but
      the lawyer they suggested wants $18k all-in and won't quote a
      probability.
  (3) Return to a US MS-pipeline (PhD admit possible, second master's
      possible) to reset the F-1 clock and get a fresh cap-subject
      lottery cycle.
  How do I think about this with EAD expiring in 4 months? Is there
  an ordering — try X first, fall back to Y? My manager is
  supportive but the company has done O-1 sponsorships exactly twice
  in their history.
expected_domains: [cn-sde-jobhunt, cn-sde-jobhunt/visa]
