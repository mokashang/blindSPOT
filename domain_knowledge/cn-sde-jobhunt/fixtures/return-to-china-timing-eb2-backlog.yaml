id: return-to-china-timing-eb2-backlog
domain: cn-sde-jobhunt
text: |
  在美 8 年了。本科国内,master 在美国,工作 6 年, current employer
  third H-1B, I-140 approved 3 years ago (EB-2 China). priority date
  2021 年初,bulletin 现在还在 2017,按速度大概还要 8-10 年才能 file
  I-485。Senior SDE at a FAANG-adjacent unicorn, TC 大概 $380k,
  RSU 还有 2 年没 vest 完。父母在国内 60+,身体开始有状况,独生子女。
  老婆也是 H-1B 同公司,我们没有小孩。最近字节有个高级别的 offer
  让我回国(具体 level 估算大概是 staff-equivalent),package 算上
  期权大约 ¥4M/年。
  Two coupled questions: (1) 在 EB-2 China 这种 backlog 下,留下来
  等 GC 的 ROI 是不是已经变成负的了 ——8-10 年里我的 career capital
  会怎么变?(2) 字节这个 level 的 offer 我能信吗,1p3a 上看到的
  35-and-over 职场风险在 staff/senior staff 这个 level 适不适用?
  另外我看到 硅谷101 上有几期 海归 podcast 嘉宾的叙述,他们都是
  2018-2020 回去的,现在 2026 的市场是不是已经不一样了?
