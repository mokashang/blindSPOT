notes: |
  Net-new D5 fixture filling solo-H-1B-layoff persona (no spouse
  coupling). Distinct from layoff-on-h1b-with-h4-spouse: that one
  is D5+D7 family-coupled; this one is D5+D6 (return-to-China as
  one of three competing paths) with single-decision-maker
  trade-off arithmetic. Risk surfaces lean on grace-clock-mechanic
  and parallel-track-sequencing — the H-1B-transfer-vs-I-539-vs-
  return-to-China tri-choice is structurally different from
  spouse-coupled cascade-failure framing.
