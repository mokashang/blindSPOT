id: ac21-employer-switch-mid-perm-with-priority-date
domain: cn-sde-jobhunt
text: |
  H-1B Year 4 of 6 at a Series-C unicorn. PERM filed April 2022,
  priority date 2022-04-15 (EB-2 China). I-140 approved March 2024
  (>180 days ago). A FAANG L5 offer just landed — $90k TC bump plus
  much better RSU refresh trajectory. The FAANG recruiter pitched
  AC21 §106(c) portability: "you keep your 2022 priority date, we
  refile PERM later, you get cap-exempt H-1B extensions past Year 6
  via the I-140-pending-3-years rule." Their immigration team will
  do the H-1B transfer but won't commit to a refile-PERM timeline.
  My questions: (a) AC21 same-or-similar — L5 SDE at FAANG vs my
  current Senior SDE at the unicorn, is that "same or similar"? The
  job code on my PERM is 15-1132.00 (Software Developers,
  Applications); FAANG's posted req is 15-1133.00 (Software
  Developers, Systems). Is that a problem? (b) If FAANG never refiles
  PERM, can I still file I-485 when my 2022-04 priority date becomes
  current under my old I-140 — or does the I-140 get withdrawn 180
  days after I leave? (c) The current employer is hinting at a
  retention RSU package. How do I weight "stay through PERM + I-485
  filing window" vs "switch now with portability"?
