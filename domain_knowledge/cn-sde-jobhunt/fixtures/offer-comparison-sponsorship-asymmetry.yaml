  - 4-year-TC-arithmetic
  - PERM-timing-by-employer-stage
  - priority-date-coupling-to-employer-choice
  - day-1-CPT-fallback-if-h1b-misses
  - 1p3a-sponsorship-history-as-signal
expected_decisions: [1, 9, 12]
expected_framings: [F1, F2, F3, F6]
