id: parents-on-b2-childcare-aging-care-state-residency
domain: cn-sde-jobhunt
text: |
  H-1B Year 4,EB-2 China I-140 approved 2024 (priority date 2023-06,
  按 bulletin 现在的速度估计还要 8-10 年才能 file I-485)。在湾区一家
  FAANG 做 Senior SDE,TC ~$420k,RSU 还有 3 年没 vest 完。老婆 H-4,
  上 H-4-EAD 在做 remote PM。我们 6 个月前刚有了第一个孩子 (US-born,
  US citizen)。

  现在最压头的是 childcare + 父母接来美国这一摊事。

  父母情况:我爸 68,我妈 65,都在国内。我爸 3 年前查出 type-2 diabetes
  + 高血压控制中,我妈去年做了 knee replacement,recovery OK 但走路
  还是有点 limit。两个人都没出过国,英语零基础。独生子女,他们也想来
  看看孙子。

  Plan 是这样:让父母办 B-2 (10-year multiple-entry tourism visa,他们
  上次 2019 没办成 — administrative processing 421(g) 拖了 4 个月最后
  case closed,这次重新申请),来美国帮我们带娃。问题是 B-2 single
  stay max 6 个月,理论上可以 leave-and-reenter,但 CBP 在 entry 时
  scrutiny 越来越严 (1p3a 上有人说今年 SFO 二审被遣返的案例),长期
  停留模式 high-risk。我看了 Murthy 几篇 bulletin,说 B-2 extension
  via I-539 可以再加 6 个月,但 frequent 申请会 raise immigrant-intent
  flag,影响下次 visa renewal。

  几个 coupled questions:

  (a) Childcare timeline:孩子现在 6 个月,daycare 至少要等到 18 个月
      (湾区好的 infant care 现在 wait list 1 年起,$3k-3.5k/月),所以
      接下来 12 个月是 childcare gap 最痛的窗口。父母 B-2 能不能 cover
      这 12 个月? 如果分两段 (第一段 6 个月 → 回国 2-3 个月 → 第二段
      I-539 extension 或者重新入境),CBP 第二次入境会不会因为 stay 时长
      被怀疑 immigrant intent 拒入?

  (b) 父母 aging window:我爸现在 68,糖尿病 + 心血管 risk,过 5 年可能
      就 not fit to travel 了。如果我们要让父母长期 (10+ 年) 帮看孩子,
      唯一的合法 path 是我自己拿到 GC 后办 I-130 给父母 (IR-5 parent of
      US citizen 不适用 — 那个 requires the sponsor to be a US citizen,
      我是 LPR 之后还要再等入籍才能办;以及即使 file 了 IR-5,父母这个
      年龄 + 健康状况能不能 pass medical exam 也是问题)。这个 path
      timeline 大概是 我入籍后 10-15 年才能让父母拿到 GC ——到那时我爸
      78,我妈 75。基本上不现实。

  (c) State-residency for parents' healthcare:父母 B-2 期间没有 US
      health insurance,visitor insurance (e.g. Atlas America) 只 cover
      emergency,exclude pre-existing conditions (糖尿病 / 心血管均是)。
      如果父母有严重 acute event,bill 可能 $50k-200k+。看到一些
      Chinese-medical-tourism 帖子说 CA 的 Medi-Cal 有 emergency-only
      provision (PRUCOL / Emergency Medi-Cal) 对 income-qualifying
      undocumented + non-immigrant 也开放, 但 B-2 holder 的 income
      threshold 计算方式不清楚 (是按 sponsor 的 affidavit-of-support
      还是 visitor 自己 declare $0?)。其他 state 比如 WA / NY / MA
      的 emergency-Medicaid 怎么样?这个能不能 factor 进我之后 employer
      switch 时的 state-of-residence 决定?

  (d) Kids' school:孩子现在还小,但 4 年后 pre-K,我们已经在看湾区
      vs Seattle vs Boston 几个 metro。湾区 SFUSD/PAUSD/Cupertino 大家
      都有听过, but cost-of-living + 学区 lottery 不确定 (PAUSD 要
      strict residency proof)。如果父母这个时候还在帮看,state 选择就
      要兼顾 (i) 离湾区飞行 reasonable, (ii) emergency-Medicaid 覆盖
      OK, (iii) 学区 + childcare 资源。能不能给我一个 decision frame
      把这些 axes 一起想清楚?

  Murthy 上没看到 specifically 关于 B-2 长期 childcare 的 bulletin,
  1p3a "签证版" 上的故事多数是单次 B-2 申请经验 + 短期入境,长期
  cycle pattern 的 真实数据少。我想要的不是 happy-path advice ——
  是这种 family-located 决策里我现在不知道我不知道的是什么。
