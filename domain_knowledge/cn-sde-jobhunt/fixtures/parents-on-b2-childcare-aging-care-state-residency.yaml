notes: |
  Net-new D7 fixture filling parent-B-2-coupled persona gap. The
  two existing D7 fixtures (h4-ead-spouse-considering-h1b-primary-
  switch and layoff-on-h1b-with-h4-spouse) are both spouse-centric;
  this one centers on parents-on-B-2 + aging-window + state-residency
  healthcare coupling for a newborn-childcare scenario. Cross-tagged
  D6 because the parent-aging-window + i-130-citizen-only-timeline
  arithmetic is a real driver of return-to-China timing pressure
  (parents can't be brought permanently for 25+ years under current
  rules; this often flips return-timing math). Persona
  parent-b2-visiting-caregiver-with-newborn is net-new — does not
  currently exist in tag_taxonomy_seed.yaml, but the open-vocabulary
  tag policy means triage may surface it and the taxonomy normalizer
  will handle merge-or-insert at runtime.
