id: senior-ic-startup-vs-faang-with-i140-approved
domain: cn-sde-jobhunt
text: |
  L5 SDE at a FAANG, 5 years in, H-1B Year 6 with one 3-year
  AC21 extension already approved. I-140 approved 2023, EB-2
  China priority date 2022-08. RSU cliff cleared 18 months ago,
  refreshers running ~$220k/year, base $215k; current TC
  ~$485k. Just got a Series-B offer for staff-engineer / TL on
  a high-profile AI infra startup. Package: base $200k +
  options strike at $4.20 / FMV $11.40, 0.18% post-Series-B,
  no sign-on, 4-year vest 1yr cliff. They have a CFO + outside
  counsel, but the founding eng (also CN, H-1B) said
  immigration is "case by case — we'll sponsor H-1B transfer
  but PERM only after we hire a head of people, which is 2026
  Q4 earliest." If I take this and stay 4 years, my I-140
  could be withdrawn (within 180 days of leaving FAANG); my
  priority date might survive but I'd be relying on the
  startup to refile PERM and the I-140 carryover rule. Three
  considerations colliding: (a) career capital — staff-TL at
  a hot AI infra startup vs more L5 grind at FAANG; (b) GC
  trajectory — my 2022-08 priority date with the FAANG path
  vs startup uncertainty; (c) comp math — startup options
  Black-Scholes value vs my $485k FAANG TC over the next 4
  years. I'm 33, married (spouse on H-4-EAD same company),
  one kid in K. How should I lay these out?
