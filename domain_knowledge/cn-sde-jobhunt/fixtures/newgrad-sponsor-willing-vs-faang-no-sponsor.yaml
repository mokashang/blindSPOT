notes: |
  Net-new D12 fixture filling the first-employer-choice gap where
  the existing cn-language-newgrad-offer-comp fixture frames the
  decision as bilingual code-switching + family-pressure-weighting.
  This one frames it as sponsorship-willing vs FAANG-no-sponsor TC
  delta — distinct entity (Stripe-as-FAANG-equivalent-2025-2026)
  and distinct risk-surface (sponsorship-history-base-rate vs
  hiring-manager-private-disclosure as signal). Cross-cuts D1 +
  D12 (first-offer choice IS an offer-comparison under sponsorship
  filter). The visa-arithmetic (~58% over 3 lottery attempts) is
  the load-bearing fact most CMU MSCS students under-weight.
