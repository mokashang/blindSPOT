id: newgrad-sponsor-willing-vs-faang-no-sponsor
domain: cn-sde-jobhunt
text: |
  CMU MSCS final semester,F-1 STEM-OPT 还没开始(毕业 5/15 才申)。
  两个 new-grad offer 同时在 deadline:

  Offer A — Ramp(Series B fintech, NYC)。SDE。Base $170k + sign-on
  $30k + 0.08% equity(4-yr, 1-yr cliff)。Recruiter 明确说 "we
  sponsor H-1B for all engineers, this year we filed 14 petitions
  including 6 first-time and 5 got selected"。Total comp ~$200k/yr。

  Offer B — Stripe(已 IPO, "FAANG-equivalent" in 2025-2026 tech-
  career discourse, SF)。SDE。Base $200k + sign-on $50k +
  $220k/4-yr RSU。Total comp ~$305k/yr first year, ~$255k steady
  state。问题:他们 internal recruiter 说 "we generally do not
  sponsor new-grad H-1B; we'll sponsor green card after 2 years of
  tenure but lottery petition is not standard"。Hiring manager 私下
  跟我说 "I've seen one new-grad get sponsored in 3 years"。

  我 visa 状况:F-1 → STEM-OPT(34 个月 total runway, 2026 年 5 月
  起算)。父母在福州小县城,没有 US backup。Offer 我都 verbal-
  accepted-pending-decision,deadline 周五。

  TC delta ~$100k/yr × 4yr = $400k 是真金白银。但 Stripe 这条路
  实际 visa-arithmetic 是:34 月 STEM-OPT 期间必须中签 H-1B
  (一次 ~25%, 三次累积 ~58%);如果三次都没中,要么走 O-1
  (我没有 publication,基本不可能),要么 L-1 (Stripe 没有 CN
  分公司开 transfer 的路径),要么 return-to-China。Ramp 那边
  虽然 startup risk 大 (Series B,fintech 监管不确定),但 visa
  pipeline 是 baseline 假设。

  这是 first-employer choice 的 sponsorship-history-as-filter 问题。
  我应该把 "willing-to-sponsor" 作为 hard filter,还是可以 trade
  TC 当作 visa-risk-premium?
