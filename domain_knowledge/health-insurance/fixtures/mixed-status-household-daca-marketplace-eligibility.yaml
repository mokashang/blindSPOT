id: mixed-status-household-daca-marketplace-eligibility
text: |
  Mixed-status household in Houston, TX. Me (US citizen, 36), spouse
  (DACA recipient, work-authorized through 2027 renewal pending),
  two US-citizen kids (5 and 8). Household 2026 MAGI projected $74k
  (combined W-2 from both adults). Currently on my employer's
  family-tier PPO at $720/biweekly — eats a real chunk of take-home.
  My employer offers a "spouse can decline coverage at no charge"
  option, no spousal surcharge. Options I'm weighing for OE Nov 1 –
  Dec 15 (Healthcare.gov, since Texas has no state exchange):
  (a) keep family-tier PPO; (b) move myself + kids to marketplace
  silver-CSR — at our household income we'd be in CSR-73 territory
  or just above 250% FPL depending on how household-size and DACA-
  recipient eligibility are counted; (c) keep self + kids on
  marketplace, spouse stays self-only on her employer plan (small-
  business retail, $180/biweekly self-only).
  The DACA-eligibility question is the one I can't resolve: I've
  read three different things — the 2024 final rule made DACA
  recipients APTC-eligible; that rule was vacated in late 2025; CMS
  has issued mixed guidance since. The mixed-status household FPL
  math is also unclear to me: do we count my spouse in household
  size (numerator denominator?), is her income counted? Does her
  exclusion from APTC mean we lose subsidy on the kids too?
  Healthcare.gov chat says "talk to a Navigator."
