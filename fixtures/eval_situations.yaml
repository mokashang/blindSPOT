- id: h4-ead-spouse-primary-h1b-switch
  text: |
    I've been working as a senior SDE at a mid-stage fintech in
    Austin for ~3 years on H-4 EAD. 我老公 is the principal H-1B
    holder at Amazon, his PERM is filed but priority date is
    Aug 2024 — looking at 5+ years to I-485. Last month his
    skip-level got let go in a team reorg and even though my
    husband is fine, it shook me: if HE loses his job, I lose
    my EAD the day his 60-day grace runs out, regardless of
    how my own job is going. 公司刚跟我提说愿意 sponsor 我自己的
    H-1B next cycle. Math is messy though: my own H-1B = my
    status no longer depends on him, but it ALSO means I'm in
    my own GC queue (priority date reset to whenever the new
    PERM files), and we lose the option of him riding my
    eventual GC if my employer ends up faster. Plus the kid is
    starting kindergarten in Travis ISD next fall — state
    residency for in-state tuition someday depends on continuous
    domicile and his job tying us to TX. Should I switch primary
    or stay H-4-EAD and just accept the dependency?
  expected_domains: [cn-sde-jobhunt/visa]
  expected_entities: [H-4, H-4-EAD, H-1B, EAD, state-residency,
                      PERM, priority-date, 60-day-grace-period]
  expected_personas: [h4-spouse-eligible-for-ead, h4-spouse-on-ead]
  expected_risk_surfaces: [h4-ead-vulnerability-to-principal-job-loss,
                           state-residency-coupling-to-spouse-status,
                           h1b-primary-vs-h4-ead-stability-tradeoff,
                           family-coupling, visa-status-pressure,
                           opportunity-cost]

- id: mid-i140-switch-same-or-similar-rfe-risk
  text: |
    My I-140 was approved 14 months ago under EB-2, current title is
    Software Engineer III at a FAANG, PERM was filed against that job
    description (general full-stack SDE, SOC code 15-1252). Just got
    an offer from a different employer for Staff Machine Learning
    Engineer — pay bump, much better team, but the role substance is
    notably narrower: ML training infrastructure, model serving, no
    generalist app-layer work. Attorney at new employer says AC21
    §106(c) portability is fine because both fall under broad
    "software engineering occupations" and the priority date carries.
    My current employer's attorney is more cautious — says USCIS has
    been issuing same-or-similar RFEs on title jumps from "Software
    Engineer" to "Staff ML Engineer" because SOC 15-1252 vs 15-2051
    (data scientist family) is a real classification gap, and the
    duties test gets read narrowly under recent AAO decisions. If I
    file the I-485 portability letter and USCIS RFEs on same-or-
    similar, can I still preserve the priority date, or does a denial
    on portability cascade into needing a new PERM at the new
    employer? How real is the SOC-code mismatch risk in 2026?
  expected_domains: [cn-sde-jobhunt/employer-switch, cn-sde-jobhunt/visa]
  expected_entities: [AC21, I-140, PERM, priority-date, same-or-similar,
                      USCIS, RFE, SOC-code]
  expected_personas: [senior-engineer-with-i140-approved,
                      mid-perm-considering-switch]
  expected_risk_surfaces: [same-or-similar, i-140-portability,
                           priority-date-preservation,
                           rfe-risk-on-amended-i485,
